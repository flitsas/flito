# docker-compose LOCAL — desarrollo/pruebas en la máquina del desarrollador.
#
# A diferencia del VPS (docker-compose.prod.yml), aquí SÍ se levantan Postgres
# y Redis en contenedores para que el stack sea autocontenido.
#
# Puertos (defaults = convención DEV):
#   web       http://localhost:4051   (nginx: estático + proxy /api → api)
#   api       http://localhost:4052   (Express; health: /api/health)
#   postgres  localhost:5434          (5432/5433 suelen estar ocupados en local)
#   redis     localhost:6380          (6379 suele tener un Redis local)
#
# Uso:
#   docker compose up -d --build          # levanta todo (migraciones incluidas)
#   docker compose logs -f api            # logs del backend
#   docker compose down -v                # apaga y borra datos (¡borra la BD!)
#
# Los valores por defecto de secretos son SOLO PARA DESARROLLO LOCAL.
# Cualquier variable se puede sobrescribir con un archivo .env junto a este compose.

name: flito

x-restart-policy: &restart unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: operaciones_db
      POSTGRES_USER: operaciones_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flito_local_dev}
    ports:
      # 5434 en el host: 5432 suele tener un Postgres local y 5433 lo usa
      # flit-file-manager. Este mapeo es solo para clientes SQL desde el host.
      - '127.0.0.1:${POSTGRES_PORT:-5434}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U operaciones_app -d operaciones_db']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: *restart

  redis:
    image: redis:7-alpine
    ports:
      # 6380 en el host para NO chocar con un Redis local en 6379 (la API usa la
      # red interna de compose; este mapeo es solo para redis-cli desde el host).
      - '127.0.0.1:${REDIS_PORT:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: *restart

  # Job one-shot: aplica migraciones SQL pendientes (idempotente) antes de que
  # arranque la API. Reusa la MISMA imagen de la api.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: flito/api:local
    command: ['node', 'dist/scripts/db-apply.js']
    environment:
      DATABASE_URL: postgresql://operaciones_app:${POSTGRES_PASSWORD:-flito_local_dev}@postgres:5432/operaciones_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: flito/api:local
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4052}
      DATABASE_URL: postgresql://operaciones_app:${POSTGRES_PASSWORD:-flito_local_dev}@postgres:5432/operaciones_db
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4051}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:4051}
      # ─ Secretos SOLO-DEV (cumplen validación Zod de env.ts; NUNCA usar en VPS) ─
      JWT_SECRET: ${JWT_SECRET:-flito-local-dev-jwt-secret-no-usar-en-produccion-0000}
      RUNT_INTERNAL_KEY: ${RUNT_INTERNAL_KEY:-flito-local-dev-runt-key-0000}
      PII_ENC_KEY: ${PII_ENC_KEY:-0f1e2d3c4b5a69788796a5b4c3d2e1f00f1e2d3c4b5a69788796a5b4c3d2e1f0}
      PII_HMAC_KEY: ${PII_HMAC_KEY:-a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90}
      # ─ Integraciones opcionales (mock/vacío por defecto en dev) ─
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RNDC_MODE: ${RNDC_MODE:-mock}
      FIRMA_PROVIDER: ${FIRMA_PROVIDER:-mock}
      FLIT_ADAPTER: ${FLIT_ADAPTER:-mock}
      # S3_* son OBLIGATORIAS en env.ts (min 3/8 chars) aunque MinIO no se use en
      # local — placeholders para pasar el boot; sobrescribir si se prueba storage.
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-flito-dev-access}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-flito-dev-secret}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - '127.0.0.1:${API_PORT:-4052}:${API_PORT:-4052}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:'+(process.env.PORT||4052)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: *restart

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: flito/web:local
    environment:
      NGINX_PORT: ${FRONTEND_PORT:-4051}
      API_HOST: api
      API_PORT: ${API_PORT:-4052}
    ports:
      - '127.0.0.1:${FRONTEND_PORT:-4051}:${FRONTEND_PORT:-4051}'
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:${FRONTEND_PORT:-4051}/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: *restart

volumes:
  pgdata:
