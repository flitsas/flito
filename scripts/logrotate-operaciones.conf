# Logrotate config para operaciones-system PM2 logs y backup script.
# Instalar: cp este archivo a /etc/logrotate.d/operaciones-system
# Test: logrotate -d /etc/logrotate.d/operaciones-system

/var/log/pm2/operaciones-out.log
/var/log/pm2/operaciones-error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    su root root
}

/var/log/operaciones-backup.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su root root
}
